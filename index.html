<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PMAX — Daily Team Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161d;
    --bg3: #1a1e28;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #eef0f6;
    --text2: #8a8fa8;
    --text3: #555a72;
    --mkt: #7c6fff;
    --mkt-bg: rgba(124,111,255,0.1);
    --mkt-border: rgba(124,111,255,0.25);
    --partner: #2dd4a0;
    --partner-bg: rgba(45,212,160,0.1);
    --partner-border: rgba(45,212,160,0.25);
    --bd: #ff7c4d;
    --bd-bg: rgba(255,124,77,0.1);
    --bd-border: rgba(255,124,77,0.25);
    --accent: #7c6fff;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(13,15,20,0.92); backdrop-filter: blur(12px); z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; }
  .logo-text { font-size: 14px; font-weight: 600; color: var(--text); }
  .logo-sub { font-size: 12px; color: var(--text3); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .refresh-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text2); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; }
  .refresh-btn:hover { background: var(--bg2); color: var(--text); }
  .refresh-btn svg { width: 14px; height: 14px; }
  .last-updated { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }

  .main { max-width: 980px; margin: 0 auto; padding: 36px 24px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
  .tab-btn { padding: 10px 18px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text3); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; margin-bottom: -1px; display: flex; align-items: center; gap: 7px; }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text2); }
  .tab-icon { width: 14px; height: 14px; opacity: 0.7; }
  .view { display: none; }
  .view.active { display: block; }

  .date-row { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .date-label { font-size: 13px; color: var(--text2); }
  .date-input { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 7px 12px; outline: none; cursor: pointer; color-scheme: dark; }
  .date-input:focus { border-color: var(--accent); }
  .today-btn { padding: 7px 14px; background: transparent; border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text2); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; }
  .today-btn:hover { color: var(--text); }

  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
  .metric { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
  .metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .metric-value { font-size: 28px; font-weight: 600; color: var(--text); line-height: 1; font-family: 'DM Mono', monospace; }
  .metric-value span { font-size: 14px; color: var(--text3); font-weight: 400; }

  /* Team filter buttons */
  .team-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 28px; }
  .team-nav-btn { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 13px; color: var(--text2); font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .team-nav-btn:hover { border-color: var(--border2); background: var(--bg3); color: var(--text); }
  .team-nav-btn.active { border-color: var(--accent); background: rgba(124,111,255,0.08); color: var(--text); }
  .team-nav-btn.missing { opacity: 0.4; cursor: default; }
  .team-nav-btn.missing:hover { opacity: 0.65; background: var(--bg2); border-color: var(--border); color: var(--text2); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-on { background: var(--partner); box-shadow: 0 0 6px rgba(45,212,160,0.5); }
  .dot-off { background: var(--text3); }

  .team-section { margin-bottom: 20px; }
  .team-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; animation: fadeUp 0.3s ease both; }
  .team-card.mkt { border-top: 2px solid var(--mkt); }
  .team-card.partnership { border-top: 2px solid var(--partner); }
  .team-card.bd { border-top: 2px solid var(--bd); }
  .team-card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .team-header-left { display: flex; align-items: center; gap: 10px; }
  .team-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.04em; }
  .badge-mkt { background: var(--mkt-bg); color: var(--mkt); border: 1px solid var(--mkt-border); }
  .badge-partnership { background: var(--partner-bg); color: var(--partner); border: 1px solid var(--partner-border); }
  .badge-bd { background: var(--bd-bg); color: var(--bd); border: 1px solid var(--bd-border); }
  .team-author { font-size: 13px; color: var(--text2); }
  .team-time { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; display: flex; align-items: center; gap: 6px; }
  .team-time::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--partner); box-shadow: 0 0 5px rgba(45,212,160,0.4); }
  .team-card-body { padding: 20px; }

  .missing-card { background: var(--bg2); border: 1px dashed var(--border2); border-radius: var(--radius); padding: 24px 20px; display: flex; align-items: center; gap: 12px; color: var(--text3); font-size: 13px; }
  .missing-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .history-filters { display: flex; gap: 10px; margin-bottom: 24px; }
  .filter-select { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 12px; outline: none; cursor: pointer; color-scheme: dark; }
  .day-group { margin-bottom: 28px; }
  .day-divider { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .day-divider-date { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text3); white-space: nowrap; }
  .day-divider-line { flex: 1; height: 1px; background: var(--border); }

  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 14px; }

  .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; }
  .popup-overlay.show { display: flex; }
  .popup-box { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 32px; text-align: center; max-width: 300px; width: 90%; animation: fadeUp 0.2s ease; }
  .popup-icon { font-size: 28px; margin-bottom: 12px; }
  .popup-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .popup-sub { font-size: 13px; color: var(--text3); margin-bottom: 20px; line-height: 1.6; }
  .popup-close { padding: 8px 24px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text2); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .popup-close:hover { color: var(--text); }

  /* Task Tracker */
  .tracker-search-row { display: flex; gap: 10px; margin-bottom: 24px; }
  .tracker-input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 16px; outline: none; transition: border-color 0.2s; }
  .tracker-input:focus { border-color: var(--accent); }
  .tracker-input::placeholder { color: var(--text3); }

  .tracker-task-group { margin-bottom: 28px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .tracker-task-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg3); }
  .tracker-task-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .tracker-task-count { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }

  .tracker-entry { padding: 14px 20px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 100px 120px 1fr; gap: 12px; align-items: start; }
  .tracker-entry:last-child { border-bottom: none; }
  .tracker-date { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text3); padding-top: 2px; }
  .tracker-meta { display: flex; flex-direction: column; gap: 4px; }
  .tracker-pic { font-size: 12px; color: var(--text2); }
  .tracker-detail { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .tracker-nextstep { font-size: 12px; color: var(--accent); margin-top: 4px; }
  .tracker-highlight { background: rgba(124,111,255,0.2); border-radius: 2px; padding: 0 2px; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateY(0); }

  .loading { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 10px; color: var(--text3); font-size: 13px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 640px) { .metrics { grid-template-columns: repeat(2, 1fr); } .team-nav { grid-template-columns: repeat(2, 1fr); } .topbar { padding: 14px 16px; } .main { padding: 20px 16px; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">PM</div>
    <div>
      <div class="logo-text">PMAX Daily Report</div>
      <div class="logo-sub">Internal Dashboard</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="last-updated" id="last-updated">—</span>
    <button class="refresh-btn" onclick="loadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Làm mới
    </button>
  </div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('dashboard')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="tab-btn" onclick="switchTab('history')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Lịch sử
    </button>
    <button class="tab-btn" onclick="switchTab('tracker')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Task Tracker
    </button>
  </div>

  <div id="view-dashboard" class="view active">
    <div class="date-row">
      <span class="date-label">Xem ngày</span>
      <input type="date" class="date-input" id="dash-date" onchange="renderDashboard()" />
      <button class="today-btn" onclick="setToday()">Hôm nay</button>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Teams đã báo cáo</div><div class="metric-value" id="m-teams">—</div></div>
      <div class="metric"><div class="metric-label">Báo cáo tháng này</div><div class="metric-value" id="m-month">—</div></div>
      <div class="metric"><div class="metric-label">Báo cáo năm nay</div><div class="metric-value" id="m-year">—</div></div>
      <div class="metric"><div class="metric-label">Tổng tất cả</div><div class="metric-value" id="m-total">—</div></div>
    </div>
    <div id="dash-content"><div class="loading"><div class="spinner"></div> Đang tải dữ liệu...</div></div>
  </div>

  <div id="view-tracker" class="view">
    <div class="tracker-search-row">
      <input type="text" class="tracker-input" id="tracker-query" placeholder="Tìm task... vd: Credential, Vifon, MOU" oninput="renderTracker()" />
      <select class="filter-select" id="tracker-team" onchange="renderTracker()">
        <option value="all">Tất cả team</option>
        <option value="mkt">Team MKT</option>
        <option value="partnership">Team Partnership</option>
        <option value="bd">Team BD</option>
      </select>
    </div>
    <div id="tracker-content"><div class="empty"><div class="empty-icon" style="opacity:0.3">🔍</div><div class="empty-text">Nhập từ khóa để tìm task</div></div></div>
  </div>

  <div id="view-history" class="view">
    <div class="history-filters">
      <select class="filter-select" id="hist-team" onchange="renderHistory()">
        <option value="all">Tất cả team</option>
        <option value="mkt">Team MKT</option>
        <option value="partnership">Team Partnership</option>
        <option value="bd">Team BD</option>
      </select>
      <input type="month" class="filter-select" id="hist-month" onchange="renderHistory()" />
    </div>
    <div id="history-content"><div class="loading"><div class="spinner"></div> Đang tải dữ liệu...</div></div>
  </div>
</div>

<div class="popup-overlay" id="popup-overlay" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="popup-box">
    <div class="popup-icon">📭</div>
    <div class="popup-title" id="popup-title">Chưa có báo cáo</div>
    <div class="popup-sub" id="popup-sub">Team này chưa nộp báo cáo hôm nay.</div>
    <button class="popup-close" onclick="document.getElementById('popup-overlay').classList.remove('show')">Đóng</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ==================================================
  // ĐỔI URL NÀY SAU KHI DEPLOY
  // ==================================================
  const DATA_URL = 'https://raw.githubusercontent.com/Jolienguyen255/dailyreportsystem/main/data.json';
  // ==================================================

  let reports = [];
  let activeTeam = 'all';

  async function loadData() {
    try {
      const r = await fetch(DATA_URL + '?t=' + Date.now());
      if (!r.ok) throw new Error('fetch failed');
      reports = await r.json();
      document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
      renderDashboard();
      renderHistory();
      showToast('Đã tải dữ liệu mới nhất');
    } catch (e) {
      reports = DEMO_DATA;
      document.getElementById('last-updated').textContent = 'Demo mode';
      renderDashboard();
      renderHistory();
    }
  }

  function todayStr() { return new Date().toISOString().slice(0, 10); }
  function setToday() { document.getElementById('dash-date').value = todayStr(); renderDashboard(); }
  function formatDate(d) { const p = d.split('-'); return p[2] + '/' + p[1] + '/' + p[0]; }
  function formatTime(iso) { try { return new Date(iso).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }); } catch { return ''; } }
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', ['dashboard','history','tracker'][i] === name));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    if (name === 'tracker') renderTracker();
  }
  function teamLabel(t) { return { mkt: 'Team MKT', partnership: 'Team Partnership', bd: 'Team BD' }[t] || t; }

  function linkify(str) {
    if (!str) return '';
    return str.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(124,111,255,0.3);word-break:break-all">$1</a>');
  }

  function tienDoColor(td) {
    if (!td) return 'var(--text3)';
    const s = td.toLowerCase();
    if (s.includes('xong') || s.includes('done') || s.includes('hoàn thành') || s.includes('100%')) return 'var(--partner)';
    if (s.includes('chờ') || s.includes('pending') || s.includes('block')) return 'var(--bd)';
    return '#f5c542';
  }

  function renderTaskList(tasks) {
    if (!tasks || tasks.length === 0) return '<div style="color:var(--text3);font-size:13px;padding:8px 0">Không có task</div>';
    return tasks.map((t, i) => `
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:${(t.pic||t.chiTiet||t.nextStep||t.link)?'8px':'0'}">
          <div style="display:flex;align-items:center;gap:8px;flex:1">
            <span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);flex-shrink:0">${String(i+1).padStart(2,'0')}</span>
            <span style="font-size:14px;font-weight:500;color:var(--text)">${t.tenTask}</span>
          </div>
          ${t.tienDo ? `<span style="font-size:11px;font-weight:600;color:${tienDoColor(t.tienDo)};background:rgba(255,255,255,0.05);padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0">${t.tienDo}</span>` : ''}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text2)">
          ${t.pic ? `<span><span style="color:var(--text3)">PIC&nbsp;</span>${t.pic}</span>` : ''}
          ${t.chiTiet ? `<span style="flex-basis:100%;color:var(--text2);line-height:1.6">${t.chiTiet}</span>` : ''}
          ${t.nextStep ? `<span style="flex-basis:100%"><span style="color:var(--text3)">Next&nbsp;</span>${t.nextStep}</span>` : ''}
          ${t.link ? `<span style="flex-basis:100%">${linkify(t.link)}</span>` : ''}
        </div>
      </div>`).join('');
  }

  function renderCard(r, teamClass) {
    return `<div class="team-card ${teamClass}">
      <div class="team-card-header">
        <div class="team-header-left">
          <span class="team-badge badge-${teamClass}">${teamLabel(teamClass)}</span>
          <span class="team-author">${r.author}</span>
          <span style="font-size:12px;color:var(--text3)">${r.tasks ? r.tasks.length + ' tasks' : ''}</span>
        </div>
        <span class="team-time">Gửi lúc ${formatTime(r.submitted)}</span>
      </div>
      <div class="team-card-body">${renderTaskList(r.tasks)}</div>
    </div>`;
  }

  function mergeByTeam(list) {
    const map = {};
    list.forEach(r => {
      const key = r.date + '_' + r.team;
      if (!map[key]) {
        map[key] = { ...r, tasks: [...(r.tasks || [])] };
      } else {
        map[key].tasks = [...map[key].tasks, ...(r.tasks || [])];
        if (r.submitted > map[key].submitted) {
          map[key].submitted = r.submitted;
          map[key].author = r.author;
        }
      }
    });
    return Object.values(map);
  }

  function filterTeam(team) {
    activeTeam = team;
    renderDashboard();
  }

  function showMissingPopup(team) {
    document.getElementById('popup-title').textContent = teamLabel(team) + ' chưa báo cáo';
    document.getElementById('popup-sub').textContent = 'Team này chưa nộp báo cáo cho ngày đang xem. Nhắc leader điền form nha!';
    document.getElementById('popup-overlay').classList.add('show');
  }

  function renderDashboard() {
    const date = document.getElementById('dash-date').value || todayStr();
    document.getElementById('dash-date').value = date;

    const day = mergeByTeam(reports.filter(r => r.date === date));
    const reported = day.map(r => r.team);
    const ym = date.slice(0, 7), y = date.slice(0, 4);

    document.getElementById('m-teams').innerHTML = reported.length + '<span>/3</span>';
    document.getElementById('m-month').textContent = reports.filter(r => r.date.startsWith(ym)).length;
    document.getElementById('m-year').textContent = reports.filter(r => r.date.startsWith(y)).length;
    document.getElementById('m-total').textContent = reports.length;

    const teams = ['mkt', 'partnership', 'bd'];
    const el = document.getElementById('dash-content');

    // Build nav buttons
    let nav = '<div class="team-nav">';
    nav += `<button class="team-nav-btn ${activeTeam === 'all' ? 'active' : ''}" onclick="filterTeam('all')">Tất cả</button>`;
    teams.forEach(t => {
      const hasDone = reported.includes(t);
      const isActive = activeTeam === t;
      const clickFn = hasDone ? `filterTeam('${t}')` : `showMissingPopup('${t}')`;
      nav += `<button class="team-nav-btn ${isActive ? 'active' : ''} ${hasDone ? '' : 'missing'}" onclick="${clickFn}">
        <span class="dot ${hasDone ? 'dot-on' : 'dot-off'}"></span>${teamLabel(t)}
      </button>`;
    });
    nav += '</div>';

    if (day.length === 0) {
      el.innerHTML = nav + `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Chưa có báo cáo nào cho ngày ${formatDate(date)}</div></div>`;
      return;
    }

    let html = nav;
    teams.forEach(t => {
      if (activeTeam !== 'all' && activeTeam !== t) return;
      const rep = day.find(r => r.team === t);
      if (!rep) {
        if (activeTeam === 'all') {
          html += `<div class="team-section"><div class="missing-card">
            <div class="missing-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
            <div><span class="team-badge badge-${t}">${teamLabel(t)}</span>&nbsp;&nbsp;Chưa có báo cáo</div>
          </div></div>`;
        }
      } else {
        html += `<div class="team-section">${renderCard(rep, t)}</div>`;
      }
    });
    el.innerHTML = html;
  }

  function renderHistory() {
    const team = document.getElementById('hist-team').value;
    const month = document.getElementById('hist-month').value;
    let filtered = reports;
    if (team !== 'all') filtered = filtered.filter(r => r.team === team);
    if (month) filtered = filtered.filter(r => r.date.startsWith(month));
    filtered = mergeByTeam(filtered);

    const el = document.getElementById('history-content');
    if (filtered.length === 0) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">Không có báo cáo nào</div></div>';
      return;
    }

    const byDate = {};
    filtered.forEach(r => { if (!byDate[r.date]) byDate[r.date] = []; byDate[r.date].push(r); });
    const dates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));

    let html = '';
    dates.forEach(d => {
      html += `<div class="day-group"><div class="day-divider">
        <span class="day-divider-date">${formatDate(d)}</span>
        <div class="day-divider-line"></div>
        <span class="day-divider-date">${byDate[d].length} team</span>
      </div>`;
      byDate[d].forEach(r => { html += renderCard(r, r.team); });
      html += '</div>';
    });
    el.innerHTML = html;
  }

  function highlight(text, query) {
    if (!query) return text;
    const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return text.replace(re, '<mark class="tracker-highlight">$1</mark>');
  }

  function renderTracker() {
    const query = (document.getElementById('tracker-query').value || '').trim().toLowerCase();
    const team  = document.getElementById('tracker-team').value;
    const el    = document.getElementById('tracker-content');

    if (!query) {
      el.innerHTML = '<div class="empty"><div class="empty-icon" style="opacity:0.3">🔍</div><div class="empty-text">Nhập từ khóa để tìm task</div></div>';
      return;
    }

    // Collect all matching task entries across all reports
    const matches = {}; // key = tenTask (normalized), value = [{date, team, author, task}]

    reports.forEach(r => {
      if (team !== 'all' && r.team !== team) return;
      (r.tasks || []).forEach(t => {
        if (!t.tenTask) return;
        if (!t.tenTask.toLowerCase().includes(query) &&
            !(t.chiTiet || '').toLowerCase().includes(query) &&
            !(t.pic || '').toLowerCase().includes(query)) return;

        // Group by normalized task name (lowercase, trimmed)
        const key = t.tenTask.trim();
        if (!matches[key]) matches[key] = [];
        matches[key].push({ date: r.date, team: r.team, author: r.author, task: t });
      });
    });

    const keys = Object.keys(matches);
    if (keys.length === 0) {
      el.innerHTML = `<div class="empty"><div class="empty-icon" style="opacity:0.3">😶</div><div class="empty-text">Không tìm thấy task nào chứa "<strong>${query}</strong>"</div></div>`;
      return;
    }

    // Sort each group by date desc
    keys.forEach(k => matches[k].sort((a,b) => b.date.localeCompare(a.date)));
    // Sort groups by most recent entry
    keys.sort((a,b) => matches[b][0].date.localeCompare(matches[a][0].date));

    let html = '';
    keys.forEach(taskName => {
      const entries = matches[taskName];
      const latestTienDo = entries[0].task.tienDo || '';
      html += `<div class="tracker-task-group">
        <div class="tracker-task-header">
          <div style="display:flex;align-items:center;gap:10px">
            <span class="tracker-task-name">${highlight(taskName, query)}</span>
            ${latestTienDo ? `<span style="font-size:11px;font-weight:600;color:${tienDoColor(latestTienDo)};background:rgba(255,255,255,0.05);padding:2px 10px;border-radius:20px">${latestTienDo}</span>` : ''}
          </div>
          <span class="tracker-task-count">${entries.length} lần log</span>
        </div>`;

      entries.forEach(e => {
        const t = e.task;
        html += `<div class="tracker-entry">
          <div class="tracker-date">${formatDate(e.date)}</div>
          <div class="tracker-meta">
            <span class="team-badge badge-${e.team}">${teamLabel(e.team)}</span>
            ${t.pic ? `<span class="tracker-pic">PIC: ${t.pic}</span>` : ''}
            ${t.tienDo ? `<span style="font-size:11px;color:${tienDoColor(t.tienDo)}">${t.tienDo}</span>` : ''}
          </div>
          <div class="tracker-detail">
            ${t.chiTiet ? `<div>${highlight(t.chiTiet, query)}</div>` : ''}
            ${t.nextStep ? `<div class="tracker-nextstep">→ ${t.nextStep}</div>` : ''}
            ${t.link ? `<div style="margin-top:4px">${linkify(t.link)}</div>` : ''}
          </div>
        </div>`;
      });

      html += '</div>';
    });

    el.innerHTML = html;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  const DEMO_DATA = [];

  document.getElementById('dash-date').value = todayStr();
  document.getElementById('hist-month').value = todayStr().slice(0, 7);
  loadData();
  setInterval(loadData, 30 * 1000);
</script>
</body>
</html>
