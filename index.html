<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PMAX — Daily Team Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161d;
    --bg3: #1a1e28;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #eef0f6;
    --text2: #8a8fa8;
    --text3: #555a72;
    --mkt: #7c6fff;
    --mkt-bg: rgba(124,111,255,0.1);
    --mkt-border: rgba(124,111,255,0.25);
    --partner: #2dd4a0;
    --partner-bg: rgba(45,212,160,0.1);
    --partner-border: rgba(45,212,160,0.25);
    --bd: #ff7c4d;
    --bd-bg: rgba(255,124,77,0.1);
    --bd-border: rgba(255,124,77,0.25);
    --accent: #7c6fff;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .logo-text {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--text3);
    font-weight: 400;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:hover { background: var(--bg2); color: var(--text); border-color: rgba(255,255,255,0.2); }
  .refresh-btn svg { width: 14px; height: 14px; }

  .last-updated {
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  /* Main layout */
  .main {
    max-width: 980px;
    margin: 0 auto;
    padding: 36px 24px;
  }

  /* Date selector */
  .date-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .date-label { font-size: 13px; color: var(--text2); }

  .date-input {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 7px 12px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    color-scheme: dark;
  }
  .date-input:focus { border-color: var(--accent); }

  .today-btn {
    padding: 7px 14px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .today-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  /* Metrics */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .metric {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    transition: border-color 0.2s;
  }
  .metric:hover { border-color: var(--border2); }

  .metric-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .metric-value {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
    font-family: 'DM Mono', monospace;
  }

  .metric-value span { font-size: 14px; color: var(--text3); font-weight: 400; }

  /* Progress dots */
  .team-status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 28px;
    padding: 14px 18px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    margin-right: 12px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-done { background: var(--partner); box-shadow: 0 0 6px rgba(45,212,160,0.5); }
  .dot-missing { background: var(--text3); }
  .dot-mkt { background: var(--mkt); }
  .dot-partner { background: var(--partner); }
  .dot-bd { background: var(--bd); }

  .status-sep { width: 1px; height: 16px; background: var(--border); margin: 0 8px; }

  /* Team report cards */
  .team-section { margin-bottom: 20px; }

  .team-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .team-card.mkt { border-top: 2px solid var(--mkt); }
  .team-card.partnership { border-top: 2px solid var(--partner); }
  .team-card.bd { border-top: 2px solid var(--bd); }

  .team-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .team-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .team-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }

  .badge-mkt { background: var(--mkt-bg); color: var(--mkt); border: 1px solid var(--mkt-border); }
  .badge-partnership { background: var(--partner-bg); color: var(--partner); border: 1px solid var(--partner-border); }
  .badge-bd { background: var(--bd-bg); color: var(--bd); border: 1px solid var(--bd-border); }

  .team-author { font-size: 13px; color: var(--text2); }

  .team-time {
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .team-time::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--partner);
    box-shadow: 0 0 5px rgba(45,212,160,0.4);
  }

  .team-card-body { padding: 20px; }

  .report-section { margin-bottom: 18px; }
  .report-section:last-child { margin-bottom: 0; }

  .report-section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .report-section-label::before {
    content: '';
    width: 3px;
    height: 12px;
    border-radius: 2px;
  }

  .label-done::before { background: var(--text2); }
  .label-next::before { background: var(--accent); }

  .task-item {
    display: flex;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
    color: var(--text2);
    line-height: 1.6;
  }
  .task-item:last-child { border-bottom: none; }

  .task-bullet {
    color: var(--text3);
    flex-shrink: 0;
    margin-top: 1px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  .task-text { flex: 1; }

  /* Missing card */
  .missing-card {
    background: var(--bg2);
    border: 1px dashed var(--border2);
    border-radius: var(--radius);
    padding: 24px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text3);
    font-size: 13px;
  }

  .missing-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* History tab */
  .history-filters {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-select {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 7px 12px;
    outline: none;
    cursor: pointer;
    color-scheme: dark;
  }

  .day-group { margin-bottom: 28px; }

  .day-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .day-divider-date {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    white-space: nowrap;
  }

  .day-divider-line { flex: 1; height: 1px; background: var(--border); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }

  .tab-btn {
    padding: 10px 18px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: -1px;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text2); }

  .tab-icon { width: 14px; height: 14px; opacity: 0.7; }

  .view { display: none; }
  .view.active { display: block; }

  /* Empty */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }

  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 14px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    gap: 10px;
    color: var(--text3);
    font-size: 13px;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .team-card { animation: fadeUp 0.3s ease both; }

  @media (max-width: 640px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .topbar { padding: 14px 16px; }
    .main { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">PM</div>
    <div>
      <div class="logo-text">PMAX Daily Report</div>
      <div class="logo-sub">Internal Dashboard</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="last-updated" id="last-updated">—</span>
    <button class="refresh-btn" onclick="loadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Làm mới
    </button>
  </div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('dashboard')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="tab-btn" onclick="switchTab('history')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Lịch sử
    </button>
  </div>

  <div id="view-dashboard" class="view active">
    <div class="date-row">
      <span class="date-label">Xem ngày</span>
      <input type="date" class="date-input" id="dash-date" onchange="renderDashboard()" />
      <button class="today-btn" onclick="setToday()">Hôm nay</button>
    </div>

    <div class="metrics" id="metrics-row">
      <div class="metric">
        <div class="metric-label">Teams đã báo cáo</div>
        <div class="metric-value" id="m-teams">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Báo cáo tháng này</div>
        <div class="metric-value" id="m-month">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Báo cáo năm nay</div>
        <div class="metric-value" id="m-year">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Tổng tất cả</div>
        <div class="metric-value" id="m-total">—</div>
      </div>
    </div>

    <div id="dash-content">
      <div class="loading"><div class="spinner"></div> Đang tải dữ liệu...</div>
    </div>
  </div>

  <div id="view-history" class="view">
    <div class="history-filters">
      <select class="filter-select" id="hist-team" onchange="renderHistory()">
        <option value="all">Tất cả team</option>
        <option value="mkt">Team MKT</option>
        <option value="partnership">Team Partnership</option>
        <option value="bd">Team BD</option>
      </select>
      <input type="month" class="filter-select" id="hist-month" onchange="renderHistory()" />
    </div>
    <div id="history-content">
      <div class="loading"><div class="spinner"></div> Đang tải dữ liệu...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ====================================================
  // CẤU HÌNH — chỉ cần đổi URL này sau khi deploy
  // ====================================================
  const DATA_URL = 'https://raw.githubusercontent.com/Jolienguyen255/dailyreportsystem/main/data.json';
  // Nếu dùng raw GitHub: 'https://raw.githubusercontent.com/YOUR_USER/YOUR_REPO/main/data.json'
  // ====================================================

  let reports = [];

  async function loadData() {
    try {
      const r = await fetch(DATA_URL + '?t=' + Date.now());
      if (!r.ok) throw new Error('fetch failed');
      reports = await r.json();
      document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
      renderDashboard();
      renderHistory();
      showToast('Đã tải dữ liệu mới nhất');
    } catch (e) {
      // fallback demo data
      reports = DEMO_DATA;
      document.getElementById('last-updated').textContent = 'Demo mode';
      renderDashboard();
      renderHistory();
    }
  }

  function todayStr() { return new Date().toISOString().slice(0, 10); }

  function setToday() {
    document.getElementById('dash-date').value = todayStr();
    renderDashboard();
  }

  function formatDate(d) {
    const p = d.split('-');
    return p[2] + '/' + p[1] + '/' + p[0];
  }

  function formatTime(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    } catch { return ''; }
  }

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', ['dashboard', 'history'][i] === name));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
  }

  function teamLabel(t) { return { mkt: 'Team MKT', partnership: 'Team Partnership', bd: 'Team BD' }[t] || t; }

  function parseTasks(text) {
    if (!text) return [];
    return text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  }

  function renderTasks(text) {
    const tasks = parseTasks(text);
    return tasks.map(t => {
      const clean = t.replace(/^[•\-\*]\s*/, '');
      return `<div class="task-item"><span class="task-bullet">›</span><span class="task-text">${clean}</span></div>`;
    }).join('');
  }

  function renderDashboard() {
    const date = document.getElementById('dash-date').value || todayStr();
    document.getElementById('dash-date').value = date;

    const day = reports.filter(r => r.date === date);
    const reported = [...new Set(day.map(r => r.team))];
    const ym = date.slice(0, 7), y = date.slice(0, 4);

    document.getElementById('m-teams').innerHTML = reported.length + '<span>/3</span>';
    document.getElementById('m-month').textContent = reports.filter(r => r.date.startsWith(ym)).length;
    document.getElementById('m-year').textContent = reports.filter(r => r.date.startsWith(y)).length;
    document.getElementById('m-total').textContent = reports.length;

    const el = document.getElementById('dash-content');
    const teams = ['mkt', 'partnership', 'bd'];

    // Status row
    let statusHtml = `<div class="team-status-row">`;
    teams.forEach(t => {
      const done = reported.includes(t);
      statusHtml += `<div class="status-item"><span class="dot ${done ? 'dot-done' : 'dot-missing'}"></span><span style="color:${done ? 'var(--text2)' : 'var(--text3)'}">${teamLabel(t)}</span></div>`;
    });
    statusHtml += `</div>`;

    if (day.length === 0) {
      el.innerHTML = statusHtml + `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Chưa có báo cáo nào cho ngày ${formatDate(date)}</div></div>`;
      return;
    }

    let html = statusHtml;
    teams.forEach((t, idx) => {
      const reps = day.filter(r => r.team === t);
      html += `<div class="team-section" style="animation-delay:${idx * 0.06}s">`;
      if (reps.length === 0) {
        html += `<div class="missing-card">
          <div class="missing-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div><span class="team-badge badge-${t}">${teamLabel(t)}</span>&nbsp;&nbsp;Chưa có báo cáo cho ngày này</div>
        </div>`;
      } else {
        reps.forEach(r => {
          html += `<div class="team-card ${t}">
            <div class="team-card-header">
              <div class="team-header-left">
                <span class="team-badge badge-${t}">${teamLabel(t)}</span>
                <span class="team-author">${r.author}</span>
              </div>
              <span class="team-time">Gửi lúc ${formatTime(r.submitted)}</span>
            </div>
            <div class="team-card-body">
              <div class="report-section">
                <div class="report-section-label label-done">Kết quả hôm nay</div>
                ${renderTasks(r.done)}
              </div>
              ${r.next ? `<div class="report-section">
                <div class="report-section-label label-next">Next step ngày mai</div>
                ${renderTasks(r.next)}
              </div>` : ''}
            </div>
          </div>`;
        });
      }
      html += '</div>';
    });
    el.innerHTML = html;
  }

  function renderHistory() {
    const team = document.getElementById('hist-team').value;
    const month = document.getElementById('hist-month').value;
    let filtered = reports;
    if (team !== 'all') filtered = filtered.filter(r => r.team === team);
    if (month) filtered = filtered.filter(r => r.date.startsWith(month));

    const el = document.getElementById('history-content');
    if (filtered.length === 0) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">Không có báo cáo nào</div></div>';
      return;
    }

    const byDate = {};
    filtered.forEach(r => { if (!byDate[r.date]) byDate[r.date] = []; byDate[r.date].push(r); });
    const dates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));

    let html = '';
    dates.forEach(d => {
      html += `<div class="day-group">
        <div class="day-divider">
          <span class="day-divider-date">${formatDate(d)}</span>
          <div class="day-divider-line"></div>
          <span class="day-divider-date">${byDate[d].length} báo cáo</span>
        </div>`;
      byDate[d].forEach(r => {
        html += `<div class="team-card ${r.team}" style="margin-bottom:12px">
          <div class="team-card-header">
            <div class="team-header-left">
              <span class="team-badge badge-${r.team}">${teamLabel(r.team)}</span>
              <span class="team-author">${r.author}</span>
            </div>
            <span class="team-time">Gửi lúc ${formatTime(r.submitted)}</span>
          </div>
          <div class="team-card-body">
            <div class="report-section">
              <div class="report-section-label label-done">Kết quả</div>
              ${renderTasks(r.done)}
            </div>
            ${r.next ? `<div class="report-section">
              <div class="report-section-label label-next">Next step</div>
              ${renderTasks(r.next)}
            </div>` : ''}
          </div>
        </div>`;
      });
      html += '</div>';
    });
    el.innerHTML = html;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  const DEMO_DATA = [

    { id: 3, date: new Date().toISOString().slice(0,10), team: 'bd', author: 'Ngọc + Đại', done: '• Final list chaebol approach trong tuần\n• Align SOP với MKT Team\n• Vifon — QS: Họp đàm phán giá round cuối\n• Zeiss — Brief: Họp clarify brief với KH\n• Thaco — Brief: Họp internal điều phối làm proposal\n• NovaGroup — NDA: Follow up process từ KH', next: '• Team BD tiếp tục action trên nhóm Chaebol\n• Chốt SOP pod assignment, điền GP2 với a.Sơn', submitted: new Date().toISOString() }
  ];

  // Init
  document.getElementById('dash-date').value = todayStr();
  document.getElementById('hist-month').value = todayStr().slice(0, 7);
